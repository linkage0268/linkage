<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>応募フォーム</title>
<script>
const params = new URLSearchParams(window.location.search);
const staff = params.get("staff") || "";

let url = "ここに応募フォーム用GASのURLを入れる";

if (staff) {
  url += "?staff=" + encodeURIComponent(staff);
}

location.replace(url);
</script>
</head>

</html>
