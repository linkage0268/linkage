<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Linkage</title>

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Linkage">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#eef3fb;
  text-align:center;
}
.header{
  padding:40px 20px 10px;
}
.logo{
  width:120px;
  height:120px;
  object-fit:contain;
  display:block;
  margin:auto;
}
.title{
  font-size:36px;
  font-weight:bold;
  margin-top:10px;
}
.sub{
  color:#666;
  margin-bottom:20px;
}
.nameBox{
  max-width:480px;
  margin:0 auto 15px;
}
.nameBox input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:16px;
}
.btn{
  width:100%;
  max-width:480px;
  margin:10px auto;
  padding:16px;
  border:none;
  border-radius:14px;
  color:#fff;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}
.schedule{ background:#3b82f6; }
.property{ background:#8b5cf6; }
.car{ background:#0ea5e9; }
.use{ background:#22c55e; }
.chat{ background:#ec4899; }
.alcohol{ background:#ef4444; }

.footer{
  margin-top:30px;
  font-size:12px;
  color:#888;
}
</style>
</head>

<body>

<div class="header">
  <img src="icon.png" class="logo">
  <div class="title">Linkage</div>
  <div class="sub">メニューを選択してください</div>
</div>

<div class="nameBox">
  <input id="nameInput" placeholder="名前を入力（例：猪俣）">
</div>

<button class="btn schedule" onclick="go('schedule')">スケジュール</button>
<button class="btn property" onclick="go('property')">物件写真</button>
<button class="btn car" onclick="go('car')">車両管理</button>
<button class="btn use" onclick="go('use')">車両使用</button>
<button class="btn alcohol" onclick="go('alcohol')">アルコールチェック</button>
<button class="btn chat" onclick="go('chat')">社内チャット</button>

<!-- ❌ 管理画面ボタンは削除済み -->

<div class="footer">
  © Linkage System
</div>

<script>
const GAS_BASE = "https://script.google.com/macros/s/AKfycbyR-9Vi268srranmelK9R_M6YNd9Z4PVdpXsHHx9t5bIe-Oi2CremPu6NAZ4p117mvk4w/exec";

function getName(){
  let name = document.getElementById('nameInput').value.trim();
  if(!name){
    alert('名前を入力してください');
    return null;
  }
  return name;
}

function go(mode){
  const name = getName();
  if(!name) return;

  const url = GAS_BASE + "?mode=" + mode + "&name=" + encodeURIComponent(name) + "&t=" + Date.now();
  location.href = url;
}
</script>

</body>
</html>
