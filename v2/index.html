<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Linkage</title>

  <link rel="apple-touch-icon" href="icon.png">
  <link rel="icon" href="icon.png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Linkage">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <style>
    body{
      margin:0;
      font-family:sans-serif;
      background:#eef3fb;
      color:#111827;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      text-align:center;
    }
    .card{
      width:100%;
      max-width:420px;
      background:#fff;
      border-radius:22px;
      padding:28px 20px;
      box-shadow:0 12px 30px rgba(0,0,0,0.10);
    }
    .title{
      font-size:30px;
      font-weight:bold;
      margin-bottom:10px;
    }
    .sub{
      color:#6b7280;
      line-height:1.8;
      margin-bottom:20px;
    }
    .spinner{
      width:54px;
      height:54px;
      margin:0 auto 18px;
      border:5px solid #dbeafe;
      border-top:5px solid #2563eb;
      border-radius:50%;
      animation:spin 0.9s linear infinite;
    }
    .btn{
      width:100%;
      border:none;
      border-radius:14px;
      padding:14px;
      font-size:16px;
      font-weight:bold;
      color:#fff;
      background:linear-gradient(180deg,#2f6df6,#2457c9);
      cursor:pointer;
    }
    .note{
      margin-top:12px;
      font-size:12px;
      color:#6b7280;
      line-height:1.7;
    }
    @keyframes spin{
      from{ transform:rotate(0deg); }
      to{ transform:rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">Linkage</div>
    <div class="sub">メニューへ移動しています。</div>
    <div class="spinner"></div>
    <button class="btn" onclick="moveToMenu()">開かない場合はこちら</button>
    <div class="note" id="nameInfo"></div>
  </div>

  <script>
    // ★ここに、新しく作った GASメニュー の /exec URL を入れてください
    const MENU_GAS_URL = "ここにLinkageメニューGASのexec URLを貼る";

    const params = new URLSearchParams(location.search);
    const empName = (params.get("name") || "").trim();

    if (empName) {
      document.getElementById("nameInfo").textContent = empName + " さんで移動します。";
    }

    function buildMenuUrl() {
      let url = String(MENU_GAS_URL || "").trim();

      if (!url) {
        alert("MENU_GAS_URL が設定されていません。");
        return "";
      }

      if (empName) {
        url += (url.includes("?") ? "&" : "?") + "name=" + encodeURIComponent(empName);
      }

      url += (url.includes("?") ? "&" : "?") + "t=" + Date.now();
      return url;
    }

    function moveToMenu() {
      const url = buildMenuUrl();
      if (!url) return;
      location.replace(url);
    }

    window.addEventListener("load", function() {
      setTimeout(moveToMenu, 200);
    });
  </script>
</body>
</html>
