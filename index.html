<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <title>Linkage</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Linkage">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#dfe7f2">

  <!-- ホーム画面アイコン -->
  <link rel="apple-touch-icon" sizes="180x180" href="icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon.png">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #dfe7f2;
      color: #111827;
    }

    body {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding:
        calc(env(safe-area-inset-top) + 28px)
        18px
        calc(env(safe-area-inset-bottom) + 28px);
    }

    .app {
      width: 100%;
      max-width: 430px;
      text-align: center;
    }

    .logo-wrap {
      margin-bottom: 18px;
    }

    .logo {
      width: 104px;
      height: 104px;
      object-fit: contain;
      display: block;
      margin: 0 auto 12px;
      border-radius: 24px;
    }

    h1 {
      margin: 0;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 0.2px;
    }

    .card {
      margin-top: 18px;
      background: #ffffff;
      border-radius: 28px;
      padding: 18px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.10);
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .btn {
      width: 100%;
      min-height: 74px;
      border: none;
      border-radius: 20px;
      font-size: 19px;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.10);
      padding: 14px 18px;
    }

    .btn-blue {
      background: linear-gradient(180deg, #4e8cff, #2f6df6);
    }

    .btn-green {
      background: linear-gradient(180deg, #28c18e, #18a67c);
    }

    .tip {
      margin-top: 18px;
      font-size: 13px;
      color: #6b7280;
      line-height: 1.7;
    }

    @media (max-width: 430px) {
      h1 {
        font-size: 28px;
      }

      .btn {
        min-height: 70px;
        font-size: 18px;
      }

      .logo {
        width: 96px;
        height: 96px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="logo-wrap">
      <img class="logo" src="icon.png" alt="Linkage">
      <h1>Linkage</h1>
    </div>

    <div class="card">
      <div class="menu">
        <button class="btn btn-blue" onclick="goMain()">
          🚗 アルコールチェック
        </button>

        <button class="btn btn-green" onclick="goForm()">
          📄 応募フォーム
        </button>
      </div>

      <div class="tip">
        ホーム画面に追加すると、アプリのように使えます
      </div>
    </div>
  </div>

  <script>
    function goMain() {
      location.href = "https://script.google.com/macros/s/AKfycbyH-MyDF11Z7RSHgOpixjMw67jm3u5KOvD24vLQ6Jfy2/exec";
    }

    function goForm() {
      location.href = "https://script.google.com/macros/s/AKfycbzh4DIlTg6eKf2oLiAq6XyOmLBgp7HVtVBrg58479gQ9LX9PwTaKaVtuvUaB5olFJTH/exec";
    }
  </script>
</body>
</html>
