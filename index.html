<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Linkage</title>

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Linkage">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#eef3fb;
  text-align:center;
}
.header{
  padding:40px 20px 10px;
}
.logo{
  width:120px;
  height:120px;
  object-fit:contain;
  display:block;
  margin:auto;
}
.title{
  font-size:36px;
  font-weight:bold;
  margin-top:10px;
}
.sub{
  color:#666;
  margin-bottom:20px;
}
.nameBox{
  max-width:480px;
  margin:0 auto 15px;
  background:#eff6ff;
  color:#1d4ed8;
  border:1px solid #bfdbfe;
  border-radius:16px;
  padding:12px;
  font-size:18px;
  font-weight:bold;
  display:none;
}
.panel{
  background:white;
  border-radius:25px;
  padding:25px;
  max-width:480px;
  margin:auto;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}
.menu{
  display:flex;
  flex-direction:column;
  gap:15px;
}
button{
  width:100%;
  min-height:65px;
  border:none;
  border-radius:18px;
  font-size:20px;
  font-weight:bold;
  color:white;
  cursor:pointer;
  padding:12px 16px;
}
.alcohol{
  background:linear-gradient(180deg,#4e8cff,#2f6df6);
}
.form{
  background:linear-gradient(180deg,#28c18e,#18a67c);
}
.copy{
  background:linear-gradient(180deg,#f59e0b,#d97706);
}
.property{
  background:linear-gradient(180deg,#8b5cf6,#7c3aed);
}
.chat{
  background:linear-gradient(180deg,#ec4899,#db2777);
}
.footer{
  margin-top:20px;
  font-size:13px;
  color:#666;
}
.msg{
  max-width:480px;
  margin:14px auto 0;
  padding:10px 14px;
  border-radius:12px;
  font-size:14px;
  font-weight:bold;
  display:none;
  white-space:pre-line;
}
.msg.ok{
  background:#e8f7eb;
  color:#1f6b2d;
}
.msg.ng{
  background:#fdeaea;
  color:#9e1c1c;
}
</style>
</head>

<body>

<div class="header">
  <img class="logo" src="icon.png" alt="Linkage">
  <div class="title">Linkage</div>
  <div class="sub">メニュー</div>
</div>

<div id="nameBox" class="nameBox"></div>

<div class="panel">
  <div class="menu">
    <button class="alcohol" onclick="goAlcohol()">
      🚗 アルコールチェック
    </button>

    <button class="form" onclick="goForm()">
      📄 応募フォームを開く
    </button>

    <button class="copy" onclick="copyApplyUrl()">
      🔗 応募フォームURLをコピー
    </button>

    <button class="property" onclick="goProperty()">
      🏠 物件写真管理
    </button>

    <button class="chat" onclick="goChat()">
      💬 社内チャット
    </button>
  </div>

  <div class="footer">
    ホーム画面に追加するとアプリのように使えます
  </div>
</div>

<div id="msg" class="msg"></div>

<script>
const params = new URLSearchParams(window.location.search);
const empName = (params.get("name") || "").replace(/"/g, "").trim();

const PROPERTY_URL =
  "https://script.google.com/macros/s/AKfycbzJP9JEfETS5jmhSXfcPZtSLZo4FfncJ7K9HpECJ3rg2Uf0gzmFIgnlx1focBLrlCK3cw/exec";

const CHAT_URL =
  "https://script.google.com/macros/s/AKfycbwWMtzRD7oU40gOUCubq71e289Xe2BJsZIE-hTKtE5XWyUowofgKIrNfatqy-4GOA162Q/exec";

function showMsg(text, ok) {
  const el = document.getElementById("msg");
  if (!el) return;

  el.style.display = "block";
  el.className = "msg " + (ok ? "ok" : "ng");
  el.textContent = text;

  setTimeout(function() {
    el.style.display = "none";
  }, 3000);
}

function goAlcohol() {
  let url = "alcohol.html";
  if (empName) {
    url += "?name=" + encodeURIComponent(empName);
  }
  location.href = url;
}

function goForm() {
  let url = "apply.html";
  if (empName) {
    url += "?name=" + encodeURIComponent(empName);
  }
  location.href = url;
}

function copyApplyUrl() {
  if (!empName) {
    showMsg("担当者名がありません。?name=黒須 の形で開いてください。", false);
    return;
  }

  const applyUrl =
    "https://linkage0268.github.io/linkage/apply.html?name=" +
    encodeURIComponent(empName);

  navigator.clipboard.writeText(applyUrl)
    .then(function() {
      showMsg("応募フォームURLをコピーしました。\nLINEやメールに貼り付けて送れます。", true);
    })
    .catch(function() {
      showMsg("コピーに失敗しました。", false);
    });
}

function goProperty() {
  location.href = PROPERTY_URL;
}

function goChat() {
  let url = CHAT_URL;
  if (empName) {
    url += "?name=" + encodeURIComponent(empName);
  }
  location.href = url;
}

if (empName) {
  const box = document.getElementById("nameBox");
  box.style.display = "block";
  box.textContent = empName + " さんでログイン中";
}
</script>

</body>
</html>
