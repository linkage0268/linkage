<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Linkage</title>

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Linkage">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#eef3fb;
  text-align:center;
  padding-bottom:40px;
}

.header{
  padding:40px 20px 10px;
}

.logo{
  width:120px;
  height:120px;
  object-fit:contain;
  display:block;
  margin:auto;
}

.title{
  font-size:36px;
  font-weight:bold;
  margin-top:10px;
}

.sub{
  color:#666;
  margin-bottom:20px;
}

.nameBox{
  max-width:480px;
  margin:0 auto 15px;
  padding:10px;
  background:#fff;
  border-radius:12px;
}

.btn{
  width:90%;
  max-width:480px;
  margin:10px auto;
  padding:15px;
  font-size:16px;
  border:none;
  border-radius:14px;
  color:#fff;
  cursor:pointer;
  display:block;
}

/* ボタンカラー */
.alcohol{ background:linear-gradient(180deg,#3b82f6,#1d4ed8); }
.form{ background:linear-gradient(180deg,#10b981,#047857); }
.copy{ background:linear-gradient(180deg,#f59e0b,#b45309); }
.property{ background:linear-gradient(180deg,#8b5cf6,#5b21b6); }
.chat{ background:linear-gradient(180deg,#ec4899,#be185d); }
.viewer{ background:linear-gradient(180deg,#14b8a6,#0f766e); }

/* ★追加：車両管理 */
.car{ background:linear-gradient(180deg,#0ea5e9,#0369a1); }

.footer{
  font-size:12px;
  color:#888;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="header">
  <img src="icon.png" class="logo">
  <div class="title">Linkage</div>
  <div class="sub">メニュー</div>
</div>

<div class="nameBox" id="userBox">
  ログイン中
</div>

<button class="btn alcohol" onclick="goAlcohol()">🚗 アルコールチェック</button>
<button class="btn form" onclick="goForm()">📄 応募フォームを開く</button>
<button class="btn copy" onclick="copyForm()">🔗 応募フォームURLをコピー</button>

<!-- ★追加：車両管理 -->
<button class="btn car" onclick="goCar()">🚘 車両管理</button>

<button class="btn property" onclick="goProperty()">🏠 物件写真管理</button>
<button class="btn chat" onclick="goChat()">💬 社内チャット</button>
<button class="btn viewer" onclick="goPropertyViewer()">🔍 物件写真検索</button>

<div class="footer">
  ホーム画面に追加するとアプリのように使えます
</div>

<script>
// =============================
// URL設定（ここだけ変更してください）
// =============================

const ALCOHOL_URL = "https://script.google.com/macros/s/AKfycbwTz--vuCZJ7y_B81x75kXOTDbAykpW5FDSqgwnl3WBaWqFFx6pojuQQTz2oO4yZx1S1A/exec";
const FORM_URL = "ここにURL";
const PROPERTY_URL = "https://script.google.com/macros/s/AKfycbwv_KJ-G_bLd5uDud4y4HARi6Vv7RtyKGu_JTl17oCoWu2zITbmtcwDWITMWxr8BpC8/exec";
const CHAT_URL = "https://script.google.com/macros/s/AKfycbyVJ3ytI7gP2ElrSCGxSo9t7vAbWl1vFiCQtIRe8zX4GbZvOLKCpvg9JhfozuBk5caKLA/exec";
const VIEWER_URL = "";

/* ★重要：車両管理GASのURL */
const CAR_URL = "https://script.google.com/macros/s/AKfycbyBJEltOesFivlN9rIV1nT7FhpnAKqrgaChu3gURajqGX5QLsVf_q1GAIO3U2qQRyQy3w/exec";


// =============================
// 名前取得（?name=黒須）
// =============================
const params = new URLSearchParams(location.search);
const empName = params.get("name");

if(empName){
  document.getElementById("userBox").innerHTML =
    "<b>" + empName + "</b> さんでログイン中";
}


// =============================
// 各機能
// =============================
function goAlcohol(){
  move(ALCOHOL_URL);
}

function goForm(){
  move(FORM_URL);
}

function goProperty(){
  move(PROPERTY_URL);
}

function goChat(){
  move(CHAT_URL);
}

function goPropertyViewer(){
  move(VIEWER_URL);
}

/* ★追加：車両管理 */
function goCar(){
  move(CAR_URL);
}


// =============================
// 共通遷移処理（name引き渡し）
// =============================
function move(baseUrl){
  let url = baseUrl;

  if(empName){
    url += "?name=" + encodeURIComponent(empName);
  }

  location.href = url;
}


// =============================
// URLコピー
// =============================
function copyForm(){
  navigator.clipboard.writeText(FORM_URL);
  alert("コピーしました！");
}
</script>

</body>
</html>
