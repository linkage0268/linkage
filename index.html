<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Linkage</title>

<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Linkage">

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:#eef3fb;
  text-align:center;
}

.header{
  padding:40px 20px 10px;
}

.logo{
  width:120px;
  height:120px;
  object-fit:contain;
  display:block;
  margin:auto;
}

.title{
  font-size:36px;
  font-weight:bold;
  margin-top:10px;
}

.sub{
  color:#666;
  margin-bottom:20px;
}

.nameBox{
  max-width:480px;
  margin:0 auto 15px;
  background:#eff6ff;
  color:#1d4ed8;
  border:1px solid #bfdbfe;
  border-radius:16px;
  padding:12px;
  font-size:18px;
  font-weight:bold;
  display:none;
}

.panel{
  background:white;
  border-radius:25px;
  padding:25px;
  max-width:480px;
  margin:auto;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.menu{
  display:flex;
  flex-direction:column;
  gap:15px;
}

button{
  width:100%;
  height:65px;
  border:none;
  border-radius:18px;
  font-size:20px;
  font-weight:bold;
  color:white;
  cursor:pointer;
}

.alcohol{
  background:linear-gradient(180deg,#4e8cff,#2f6df6);
}

.form{
  background:linear-gradient(180deg,#28c18e,#18a67c);
}

.footer{
  margin-top:20px;
  font-size:13px;
  color:#666;
}
</style>
</head>

<body>

<div class="header">
  <img class="logo" src="icon.png" alt="Linkage">
  <div class="title">Linkage</div>
  <div class="sub">メニュー</div>
</div>

<div id="nameBox" class="nameBox"></div>

<div class="panel">
  <div class="menu">
    <button class="alcohol" onclick="goAlcohol()">
      🚗 アルコールチェック
    </button>

    <button class="form" onclick="goForm()">
      📄 応募フォーム
    </button>
  </div>

  <div class="footer">
    ホーム画面に追加するとアプリのように使えます
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const empName = params.get("name") || "";

function goAlcohol(){
  let url = "alcohol.html";
  if(empName){
    url += "?name=" + encodeURIComponent(empName);
  }
  location.href = url;
}

function goForm(){
  location.href = "apply.html";
}

if(empName){
  const box = document.getElementById("nameBox");
  box.style.display = "block";
  box.textContent = empName + " さんでログイン中";
}
</script>

</body>
</html>
