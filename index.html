<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Linkage</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Linkage">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#dfe7f2">

  <!-- ホーム画面アイコン -->
  <link rel="apple-touch-icon" sizes="180x180" href="https://i.imgur.com/5b6Z3YQ.png">
  <link rel="icon" type="image/png" sizes="192x192" href="https://i.imgur.com/5b6Z3YQ.png">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      background: #dfe7f2;
      color: #111827;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        calc(env(safe-area-inset-top) + 24px)
        20px
        calc(env(safe-area-inset-bottom) + 24px);
    }

    .app {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .logo-wrap {
      margin-bottom: 18px;
    }

    .logo {
      width: 96px;
      height: 96px;
      object-fit: contain;
      display: block;
      margin: 0 auto 10px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
    }

    .card {
      margin-top: 18px;
      background: #ffffff;
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 10px 24px rgba(0,0,0,0.10);
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .btn {
      width: 100%;
      min-height: 58px;
      border: none;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 800;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.10);
    }

    .btn-blue {
      background: linear-gradient(180deg, #4e8cff, #2f6df6);
    }

    .btn-green {
      background: linear-gradient(180deg, #28c18e, #18a67c);
    }

    .tip {
      margin-top: 16px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="logo-wrap">
      <img class="logo" src="https://i.imgur.com/5b6Z3YQ.png" alt="Linkage">
      <h1>Linkage</h1>
    </div>

    <div class="card">
      <div class="menu">
        <button class="btn btn-blue" onclick="goMain()">
          🚗 アルコールチェック
        </button>

        <button class="btn btn-green" onclick="goForm()">
          📄 応募フォーム
        </button>
      </div>

      <div class="tip">
        ホーム画面に追加すると、アプリのように使えます
      </div>
    </div>
  </div>

  <script>
    function goMain() {
      location.href = "https://script.google.com/macros/s/AKfycbyH-MyDF11Z7RSHgOpixjMw67jm3u5KOvD24vLQ6Jfy2/exec";
    }

    function goForm() {
      location.href = "https://script.google.com/macros/s/AKfycbzh4DIlTg6eKf2oLiAq6XyOmLBgp7HVtVBrg58479gQ9LX9PwTaKaVtuvUaB5olFJTH/exec";
    }
  </script>
</body>
</html>
